<!DOCTYPE html>
<html>
<head>
    <title>Tarlac Incident Monitoring</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        #map { height: 100vh; width: 100%; background: #f0f0f0; } 
        body { margin: 0; padding: 0; font-family: sans-serif; }
        
        /* Container to stop the aura from flying away */
        .aura-container { background: none; border: none; }
        
        /* The pulsing heatwave */
        .incident-aura {
            width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(220, 38, 38, 0.85) 10%, rgba(220, 38, 38, 0.3) 50%, rgba(220, 38, 38, 0) 80%);
            border-radius: 50%;
            animation: pulse 2s infinite ease-in-out;
            pointer-events: none;
        }

        @keyframes pulse {
            0% { transform: scale(0.6); opacity: 0.9; }
            50% { transform: scale(1.3); opacity: 0.4; }
            100% { transform: scale(0.6); opacity: 0.9; }
        }
        
        /* Smaller center dot */
        .incident-center {
            background-color: #991b1b;
            border: 1.5px solid white;
            border-radius: 50%;
            box-shadow: 0 0 3px rgba(0,0,0,0.5);
        }

        /* Legend Styling */
        .info.legend {
            background: white; padding: 10px 14px;
            font-size: 14px; line-height: 24px;
            color: #333; box-shadow: 0 0 15px rgba(0,0,0,0.2);
            border-radius: 5px; border: 2px solid #b71c1c;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        var map = L.map('map').setView([15.48, 120.59], 10);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        var incidentMarkers = L.featureGroup().addTo(map);

        // PASTE YOUR CSV URL HERE
        var csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRDvZ_Avf8dU1XZUuo0HrrQbyEqpsukfyrb964X81Cwl9a2Vi5h07_m2ckWuReZrVVtlQB9eaH4_AZc/pub?gid=349846799&single=true&output=csv'; 

        Papa.parse(csvUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                results.data.forEach(function(row) {
                    var lat = parseFloat(row['LATITUDE']);
                    var lng = parseFloat(row['LONGITUDE']); 
                    
                    if (!isNaN(lat) && !isNaN(lng)) {
                        
                        // Aura will now stay glued to the coordinates
                        var auraIcon = L.divIcon({
                            html: '<div class="incident-aura"></div>',
                            className: 'aura-container',
                            iconSize: [50, 50],
                            iconAnchor: [25, 25] 
                        });
                        L.marker([lat, lng], { icon: auraIcon, interactive: false }).addTo(incidentMarkers);

                        // Smaller center dot (8x8 pixels)
                        var centerIcon = L.divIcon({
                            html: '',
                            className: 'incident-center',
                            iconSize: [8, 8],
                            iconAnchor: [4, 4]
                        });
                        var marker = L.marker([lat, lng], { icon: centerIcon });

                        // --- POPUP DATA UPDATED TO EXACT HEADERS ---
                        marker.bindPopup(`
                            <div style="line-height:1.6; min-width: 200px;">
                                <strong style="font-size:1.2em; color:#b71c1c;">INCIDENT REPORT</strong><br>
                                <hr style="margin: 5px 0;">
                                <b>Date:</b> ${row['DATE'] || 'N/A'}<br>
                                <b>Type:</b> ${row['TYPE'] || 'N/A'}<br>
                                <b>Location:</b> ${row['BARANGAY'] || 'N/A'}<br>
                            </div>
                        `);

                        marker.addTo(incidentMarkers);
                    }
                });

                if (incidentMarkers.getLayers().length > 0) {
                    map.fitBounds(incidentMarkers.getBounds(), { padding: [50, 50] });
                }
            }
        });

        // Add a Legend
        var legend = L.control({position: 'bottomright'});
        legend.onAdd = function (map) {
            var div = L.DomUtil.create('div', 'info legend');
            div.innerHTML += '<strong style="display:block; margin-bottom:5px; color:#b71c1c;">Incident Reported Geotag</strong>';
            div.innerHTML += '<div style="display:inline-block; width:10px; height:10px; background:#991b1b; border-radius:50%; margin-right:6px; border: 1.5px solid #ffcccc;"></div> Incident Location';
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
