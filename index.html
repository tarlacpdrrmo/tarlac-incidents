<!DOCTYPE html>
<html>
<head>
    <title>Tarlac PDRRMO | Impact Analytics Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Inter', sans-serif; cursor: crosshair; overflow: hidden; background: #0f172a; }
        #map { height: 100vh; width: 100vw; background: #0f172a; transition: opacity 0.3s ease; } 

        /* Premium Control Panel (Central) */
        .control-panel {
            position: absolute;
            top: 20px; 
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 8px 20px; 
            border-radius: 40px; 
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: row;
            gap: 16px; 
            align-items: center;
            white-space: nowrap;
        }

        .filter-group { display: flex; align-items: center; gap: 8px; }
        .filter-group label { font-size: 9px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; font-weight: 800; }
        .filter-group select, .filter-group input[type="text"] {
            padding: 6px 12px; 
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 20px; 
            font-family: 'Inter', sans-serif;
            font-size: 11px; 
            outline: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .filter-group input[type="text"] { width: 130px; cursor: text; }
        .filter-group select:focus, .filter-group input[type="text"]:focus { border-color: #ef4444; background: rgba(0, 0, 0, 0.5); box-shadow: 0 0 10px rgba(239, 68, 68, 0.2); }

        /* Theme Switch */
        .switch-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: 8px;
            padding-left: 16px;
            border-left: 1px solid rgba(255, 255, 255, 0.08); 
        }
        .switch { position: relative; display: inline-block; width: 36px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); transition: .3s ease; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: #94a3b8; transition: .3s ease; border-radius: 50%; }
        input:checked + .slider { background-color: rgba(255, 255, 255, 0.2); border-color: rgba(255, 255, 255, 0.3); }
        input:checked + .slider:before { transform: translateX(16px); background-color: #ffffff; }

        /* Modernized Leaflet Controls (Zoom) */
        .leaflet-control-zoom { 
            border: none !important; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.4) !important; 
            margin-top: 20px !important; 
            margin-left: 20px !important; 
            border-radius: 8px !important;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08) !important;
        }
        .leaflet-control-zoom a { 
            width: 36px !important; 
            height: 36px !important; 
            line-height: 36px !important; 
            font-size: 18px !important; 
            background: rgba(15, 23, 42, 0.8) !important; 
            backdrop-filter: blur(16px) !important; 
            color: #f8fafc !important; 
            border: none !important;
            margin: 0 !important; 
            transition: background 0.2s;
        }
        .leaflet-control-zoom-in { border-bottom: 1px solid rgba(255,255,255,0.08) !important; }
        .leaflet-control-zoom a:hover { background: rgba(255, 255, 255, 0.1) !important; color: white !important;}

        /* Modernized Treemap Expand Icon */
        .treemap-toggle-btn {
            position: absolute;
            bottom: 30px; 
            left: 30px;
            z-index: 1000;
            background: #ef4444; /* High contrast primary color */
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(239, 68, 68, 0.5);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); /* Bouncy effect */
            border: 2px solid #ffffff;
        }
        .treemap-toggle-btn:hover { 
            transform: scale(1.1) translateY(-5px);
            box-shadow: 0 15px 30px rgba(239, 68, 68, 0.6);
        }
        .treemap-toggle-btn svg { transition: transform 0.3s ease; }
        .treemap-toggle-btn:hover svg { transform: rotate(90deg); }

        /* Category Toggles (Below Controls) */
        .category-panel {
            position: absolute;
            top: 80px; 
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 90vw;
        }
        .category-btn { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); color: #94a3b8; padding: 6px 16px; border-radius: 20px; font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .category-btn:hover { background: rgba(255, 255, 255, 0.1); color: white; }
        .category-btn.active { background: #ef4444; color: white; border-color: #ef4444; box-shadow: 0 0 15px rgba(239, 68, 68, 0.5); }

        /* Impact Analytics Panel (Right) */
        .impact-panel {
            position: absolute;
            top: 130px;
            right: 20px;
            z-index: 1000;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 20px;
            color: white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 240px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .impact-panel h3 { margin: 0; font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: #94a3b8; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 10px; font-weight: 800; }
        .impact-stat { display: flex; flex-direction: column; gap: 4px; }
        .impact-title { font-size: 11px; color: #cbd5e1; font-weight: 600; line-height: 1.4; }
        .impact-number { font-size: 28px; font-weight: 800; color: #ef4444; line-height: 1; text-shadow: 0 2px 10px rgba(239, 68, 68, 0.3); }
        .impact-number.flood { color: #3b82f6; text-shadow: 0 2px 10px rgba(59, 130, 246, 0.3); } 
        .impact-number.vehicle { color: #f59e0b; text-shadow: 0 2px 10px rgba(245, 158, 11, 0.3); } 

        /* 1980x1080 FULLSCREEN TREEMAP OVERLAY */
        .treemap-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            z-index: 9999; /* Highest priority */
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s cubic-bezier(0.23, 1, 0.32, 1), visibility 0.5s;
        }
        .treemap-overlay.active { opacity: 1; visibility: visible; }

        .treemap-content-wrapper {
            background: transparent;
            width: 90vw;
            height: 85vh;
            max-width: 1700px; /* Fitting well within 1980 */
            max-height: 900px;  /* Fitting well within 1080 */
            display: flex;
            flex-direction: column;
            gap: 20px;
            transform: scale(0.9) translateY(20px);
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .treemap-overlay.active .treemap-content-wrapper { transform: scale(1) translateY(0); }

        .treemap-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        .treemap-header h3 { margin: 0; font-size: 16px; text-transform: uppercase; letter-spacing: 3px; color: #f8fafc; font-weight: 800; text-shadow: 0 2px 10px rgba(255,255,255,0.2); }
        .close-treemap { background: rgba(255,255,255,0.1); border: none; color: white; font-size: 24px; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; line-height: 1; transition: all 0.2s; }
        .close-treemap:hover { background: #ef4444; transform: rotate(90deg); }

        /* ApexCharts Tooltip Customization (Must be global) */
        .apexcharts-tooltip.apexcharts-theme-dark { 
            background: rgba(15, 23, 42, 0.9) !important;
            backdrop-filter: blur(8px) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 8px !important;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5) !important;
            font-family: 'Inter', sans-serif !important;
            padding: 8px !important;
        }
        .apexcharts-tooltip-title { display: none !important; } /* Hide default title */
        .apexcharts-tooltip-text-y-value { font-weight: 800 !important; color: #ef4444 !important; font-size: 14px !important; }

        /* Leaflet & Popups */
        .leaflet-popup-content-wrapper { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4); font-family: 'Inter', sans-serif; color: white;}
        .leaflet-popup-content { margin: 16px; color: white; }
        .leaflet-popup-tip { background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(255, 255, 255, 0.1); }

        /* Live Sync Indicator */
        .live-status { position: absolute; bottom: 30px; right: 30px; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); padding: 8px 16px; border-radius: 30px; color: #10b981; font-size: 10px; font-weight: 800; display: flex; align-items: center; gap: 10px; border: 1px solid rgba(16, 185, 129, 0.3); z-index: 1000; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        .live-dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; animation: livePulse 2s infinite; }
        @keyframes livePulse { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.6); } 70% { box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
        
        /* Watermark */
        .watermark-container { position: absolute; bottom: 90px; left: 30px; z-index: 999; display: flex; align-items: center; gap: 15px; opacity: 0.5; pointer-events: none; transition: all 0.3s ease; }
        .watermark-logo { width: 80px; height: auto; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5)); }
        .watermark-text { color: #ffffff; font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; line-height: 1.5; text-shadow: 0 2px 10px rgba(0,0,0,0.7); }
        .watermark-container.active { opacity: 0.9; transform: translateY(-5px); }

    </style>
</head>
<body>

    <div class="watermark-container" id="watermark">
        <img src="clean.jpg" alt="Tarlac Rescue Logo" class="watermark-logo">
        <div class="watermark-text">
            Tarlac Provincial Disaster Risk<br>
            Reduction Management Office
        </div>
    </div>

    <div class="live-status" id="liveStatusBox">
        <div class="live-dot"></div>
        <span id="liveStatusText">Live Sync Active</span>
    </div>

    <div class="impact-panel" id="impactPanel">
        <h3>Estimated Impact Analytics</h3>
        <div class="impact-stat">
            <span class="impact-title">Typhoon/Flood Affected (Est. Families)</span>
            <span class="impact-number flood" id="statFloodFamilies">0</span>
        </div>
        <div class="impact-stat">
            <span class="impact-title">Vehicular Accidents (Est. Vehicles Involved)</span>
            <span class="impact-number vehicle" id="statVehicles">0</span>
        </div>
    </div>

    <div class="treemap-toggle-btn" id="treemapToggleBtn" title="Expand Fullscreen Treemap Analytics">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 3 21 3 21 9"></polyline>
            <polyline points="9 21 3 21 3 15"></polyline>
            <line x1="21" y1="3" x2="14" y2="10"></line>
            <line x1="3" y1="21" x2="10" y2="14"></line>
        </svg>
    </div>

    <div class="treemap-overlay" id="treemapOverlay">
        <div class="treemap-content-wrapper">
            <div class="treemap-header">
                <h3>Incident Volume by Specific Location (Top 50)</h3>
                <button class="close-treemap" id="closeTreemapBtn">&times;</button>
            </div>
            <div id="chartContainer" style="flex: 1; min-height: 0;"></div>
        </div>
    </div>

    <div id="map"></div>

    <div class="control-panel">
        <div class="filter-group">
            <label>Search</label>
            <input type="text" id="searchFilter" placeholder="Location...">
        </div>
        <div class="filter-group">
            <label>Year</label>
            <select id="yearFilter"><option value="All">All Years</option></select>
        </div>
        <div class="filter-group">
            <label>Month</label>
            <select id="monthFilter"><option value="All">All Months</option></select>
        </div>
        <div class="switch-container">
            <label style="font-size: 9px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; font-weight: 800;">Dark Map</label>
            <label class="switch">
                <input type="checkbox" id="themeToggleCheckbox" checked>
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="category-panel" id="categoryPanel"></div>

    <script>
        // --- MAP INITIALIZATION ---
        var map = L.map('map', { zoomControl: false, fadeAnimation: true }).setView([15.4802, 120.5979], 11);
        L.control.zoom({ position: 'topleft' }).addTo(map);

        var darkBasemap = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; OpenStreetMap', maxZoom: 19 });
        var lightBasemap = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; OpenStreetMap', maxZoom: 19 });

        // Default to Dark Map based on the unreadable request (Dark is generally more modern)
        var currentBasemap = darkBasemap;
        currentBasemap.addTo(map);
        document.getElementById('themeToggleCheckbox').checked = false; // Initialize checkbox state

        document.getElementById('themeToggleCheckbox').addEventListener('change', function(e) {
            map.removeLayer(currentBasemap);
            if (e.target.checked) {
                currentBasemap = lightBasemap;
                document.getElementById('watermark').style.filter = 'invert(1) drop-shadow(0 2px 5px rgba(255,255,255,0.5))'; // Adjust watermark for light
            } else {
                currentBasemap = darkBasemap;
                document.getElementById('watermark').style.filter = 'drop-shadow(0 2px 5px rgba(0,0,0,0.5))'; // Standard dark
            }
            currentBasemap.addTo(map);
            currentBasemap.bringToBack(); 
        });

        // Watermark Interaction
        map.on('movestart', function() { document.getElementById('watermark').classList.add('active'); });
        map.on('moveend', function() { document.getElementById('watermark').classList.remove('active'); });

        // --- FULLSCREEN TREEMAP OVERLAY LOGIC ---
        var treemapOverlay = document.getElementById('treemapOverlay');
        var mapEl = document.getElementById('map');

        function openTreemap() {
            treemapOverlay.classList.add('active');
            mapEl.style.opacity = '0.3'; // Dim the map softly
            if (apexTreemapChart) {
                setTimeout(() => apexTreemapChart.render(), 100); // Ensure resize fits new container
            }
        }

        function closeTreemap() {
            treemapOverlay.classList.remove('active');
            mapEl.style.opacity = '1';
        }

        document.getElementById('treemapToggleBtn').addEventListener('click', openTreemap);
        document.getElementById('closeTreemapBtn').addEventListener('click', closeTreemap);
        
        // Close on background click or Escape key
        treemapOverlay.addEventListener('click', function(e) { if(e.target === this) closeTreemap(); });
        document.addEventListener('keydown', function(e) { if(e.key === "Escape" && treemapOverlay.classList.contains('active')) closeTreemap(); });


        // --- DATA PROCESSING & FILTERING ---
        var allData = [];
        var heatLayer = null; 
        var interactiveLayer = L.featureGroup().addTo(map); 
        var currentCategory = 'All'; 
        var apexTreemapChart = null; 

        var csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRDvZ_Avf8dU1XZUuo0HrrQbyEqpsukfyrb964X81Cwl9a2Vi5h07_m2ckWuReZrVVtlQB9eaH4_AZc/pub?gid=349846799&single=true&output=csv'; 

        fetchData(true); 
        setInterval(function() { fetchData(false); }, 60000); // Live sync every minute

        function fetchData(isInitialLoad) {
            Papa.parse(csvUrl, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    if (isInitialLoad) {
                        allData = results.data;
                        populateFilters(allData);
                        renderDashboard();
                    } else {
                        if (results.data.length !== allData.length) {
                            allData = results.data;
                            renderDashboard();
                            flashUpdateNotification();
                        }
                    }
                }
            });
        }

        function flashUpdateNotification() {
            var statusBox = document.getElementById('liveStatusBox');
            statusBox.style.background = 'rgba(16, 185, 129, 0.3)';
            statusBox.style.borderColor = '#10b981';
            setTimeout(() => {
                statusBox.style.background = 'rgba(15, 23, 42, 0.8)';
                statusBox.style.borderColor = 'rgba(16, 185, 129, 0.3)';
            }, 3000);
        }

        function populateFilters(data) {
            var years = new Set();
            var months = new Set();
            var types = new Set(); 
            
            data.forEach(row => {
                if(row['DATE']) {
                    let d = new Date(row['DATE']);
                    if(!isNaN(d)) {
                        years.add(d.getFullYear());
                        months.add(d.toLocaleString('default', { month: 'long' }));
                    }
                }
                if(row['TYPE']) { types.add(row['TYPE'].trim()); }
            });

            var yearSelect = document.getElementById('yearFilter');
            var currentYear = yearSelect.value;
            yearSelect.innerHTML = '<option value="All">All Years</option>'; 
            Array.from(years).sort().reverse().forEach(y => { yearSelect.add(new Option(y, y)); });
            if(isInitialLoad) yearSelect.value = "All"; else yearSelect.value = currentYear;

            var monthSelect = document.getElementById('monthFilter');
            var currentMonth = monthSelect.value;
            monthSelect.innerHTML = '<option value="All">All Months</option>'; 
            const monthOrder = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            Array.from(months).sort((a,b) => monthOrder.indexOf(a) - monthOrder.indexOf(b)).forEach(m => { monthSelect.add(new Option(m, m)); });
            if(isInitialLoad) monthSelect.value = "All"; else monthSelect.value = currentMonth;

            var catPanel = document.getElementById('categoryPanel');
            var buttonsHtml = `<button class="category-btn ${currentCategory === 'All' ? 'active' : ''}" onclick="setCategory('All')">All</button>`;
            
            Array.from(types).sort().forEach(t => {
                if(t !== "") {
                    let isActive = (currentCategory === t) ? 'active' : '';
                    buttonsHtml += `<button class="category-btn ${isActive}" onclick="setCategory('${t}')">${t}</button>`;
                }
            });
            catPanel.innerHTML = buttonsHtml;
        }

        window.setCategory = function(cat) {
            currentCategory = cat;
            populateFilters(allData); // Re-render buttons to update active state
            renderDashboard();
        };

        document.getElementById('searchFilter').addEventListener('input', renderDashboard);
        document.getElementById('yearFilter').addEventListener('change', renderDashboard);
        document.getElementById('monthFilter').addEventListener('change', renderDashboard);


        // --- PREMIUM 1980x1080 TREEMAP CHARTS LOGIC ---
        function updateTreemapChart(locationCounts) {
            var chartData = [];
            for (var loc in locationCounts) {
                if (loc.trim() !== '') {
                    // Clean up common prefixes for cleaner unreadable labels
                    let displayLoc = loc.replace("City of Tarlac (Capital), ", "").replace("Tarlac City, ", "");
                    chartData.push({ x: displayLoc, y: locationCounts[loc] });
                }
            }

            chartData.sort((a, b) => b.y - a.y);
            chartData = chartData.slice(0, 50); // Increased to Top 50 for the large unreadable view

            if (!apexTreemapChart) {
                var options = {
                    series: [{ data: chartData }],
                    legend: { show: false },
                    // Full Height & Transparent Background
                    chart: { type: 'treemap', height: '100%', toolbar: { show: false }, background: 'transparent', animations: { enabled: true, easing: 'easeinout', speed: 800 } },
                    theme: { mode: 'dark' },
                    dataLabels: {
                        enabled: true,
                        style: { 
                            fontSize: '18px', // Premium, Large, Bolder Font
                            fontFamily: 'Inter, sans-serif', 
                            fontWeight: 900, // Ultra-bold
                            colors: ['#ffffff'] // Force white text for premium unreadable contrast
                        },
                        // Strong Drop Shadow for unreadable legibility on any color block
                        dropShadow: {
                            enabled: true,
                            top: 2,
                            left: 2,
                            blur: 5,
                            color: '#000',
                            opacity: 0.9
                        },
                        formatter: function(text, op) { return [text, op.value] },
                        orientation: 'vertical' // Can switch to 'vertical' if blocks get too narrow
                    },
                    plotOptions: {
                        treemap: {
                            enableShades: true,
                            shadeIntensity: 0.15, // Subtle shading to keep colors vibrant
                            reverseNegativeShade: true,
                            useFillColorAsStroke: false,
                            // Modern "Disaster Risk" Color Palette (Vibrant & Deep)
                            colorScale: {
                                ranges: [
                                    { from: 1, to: 2, color: '#0ea5e9' },    // Cyan (Low Risk)
                                    { from: 3, to: 5, color: '#f59e0b' },    // Amber (Medium)
                                    { from: 6, to: 10, color: '#f97316' },   // Orange (High)
                                    { from: 11, to: 20, color: '#ef4444' },   // Red (Severe)
                                    { from: 21, to: 9999, color: '#9f1239' } // Deep Rose (Critical)
                                ]
                            }
                        }
                    },
                    stroke: { show: true, width: 2, colors: ['rgba(15, 23, 42, 0.5)'] }, // Darker strokes between blocks
                    grid: { padding: { top: 0, right: 0, bottom: 0, left: 0 } },
                    tooltip: { 
                        theme: 'dark',
                        custom: function({series, seriesIndex, dataPointIndex, w}) {
                            var data = w.globals.initialSeries[seriesIndex].data[dataPointIndex];
                            return '<div class="apexcharts-tooltip-custom">' +
                            '<span style="color: #94a3b8; font-weight:600; font-size:11px;">' + data.x + '</span><br>' +
                            '<span style="color: #ffffff; font-weight:900; font-size:18px;">' + data.y + '</span>' +
                            '<span style="color: #ef4444; font-weight:700; font-size:12px; margin-left:5px;">INCIDENTS</span>' +
                            '</div>'
                        }
                    }
                };
                apexTreemapChart = new ApexCharts(document.querySelector("#chartContainer"), options);
                apexTreemapChart.render();
            } else {
                // Update with smooth transition
                apexTreemapChart.updateSeries([{ data: chartData }]);
            }
        }

        // --- DASHBOARD RENDERING (MAP & STATS) ---
        function renderDashboard() {
            var selectedYear = document.getElementById('yearFilter').value;
            var selectedMonth = document.getElementById('monthFilter').value;
            var searchQuery = document.getElementById('searchFilter').value.toLowerCase();

            if (heatLayer) map.removeLayer(heatLayer);
            interactiveLayer.clearLayers();

            var heatPoints = [];
            var locationCounts = {}; 
            var activeCoordinates = []; 
            var totalRequests = 0;
            var rawFloodIncidents = 0;
            var rawVehicularIncidents = 0;

            allData.forEach(row => {
                var lat = parseFloat(row['LATITUDE']);
                var lng = parseFloat(row['LONGITUDE']);
                
                if (!isNaN(lat) && !isNaN(lng) && row['DATE']) {
                    let d = new Date(row['DATE']);
                    if(!isNaN(d)) {
                        let rowYear = d.getFullYear().toString();
                        let rowMonth = d.toLocaleString('default', { month: 'long' });
                        let locName = row['LOCATION'] || 'Unknown Location';
                        let incidentType = row['TYPE'] ? row['TYPE'].trim() : 'Unspecified';

                        var matchYear = (selectedYear === 'All' || selectedYear === rowYear);
                        var matchMonth = (selectedMonth === 'All' || selectedMonth === rowMonth);
                        var matchSearch = locName.toLowerCase().includes(searchQuery);
                        var matchCategory = (currentCategory === 'All' || incidentType === currentCategory); 

                        if (matchYear && matchMonth && matchSearch && matchCategory) {
                            heatPoints.push([lat, lng, 0.8]); // Lower intensity per point for cleaner unreadable look
                            activeCoordinates.push(L.latLng(lat, lng)); 
                            totalRequests++;

                            let lowerType = incidentType.toLowerCase();
                            // Est. Typhoon/Flood
                            if(lowerType.includes('flood') || lowerType.includes('typhoon') || lowerType.includes('calamity')) {
                                rawFloodIncidents++;
                            }
                            // Est. Vehicular
                            if(lowerType.includes('accident') || lowerType.includes('vehicular') || lowerType.includes('crash')) {
                                rawVehicularIncidents++;
                            }

                            // Count by exact location string
                            locationCounts[locName] = (locationCounts[locName] || 0) + 1;
                        }
                    }
                }
            });

            // Update Analytics with Multipliers
            document.getElementById('statFloodFamilies').innerText = (rawFloodIncidents * 15).toLocaleString();
            document.getElementById('statVehicles').innerText = (rawVehicularIncidents * 2).toLocaleString();

            // Update Treemap
            updateTreemapChart(locationCounts);

            // Add Soft Heatmap Layer
            heatLayer = L.heatLayer(heatPoints, {
                radius: 25,     
                blur: 20,       
                maxZoom: 15,    
                max: 1.0,       
                // Premium unreadable Gradient (Blue -> Cyan -> Green -> Yellow -> Red)
                gradient: { 0.2: '#0ea5e9', 0.4: '#22d3ee', 0.6: '#4ade80', 0.8: '#facc15', 1.0: '#ef4444' }
            }).addTo(map);
        }
    </script>
</body>
