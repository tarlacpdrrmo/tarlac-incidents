<!DOCTYPE html>
<html>
<head>
    <title>Tarlac Incident Monitoring</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        #map { height: 100vh; width: 100%; background: #f0f0f0; } 
        body { margin: 0; padding: 0; font-family: sans-serif; }
        
        .aura-container { background: none; border: none; }
        
        .incident-aura {
            width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(220, 38, 38, 0.85) 10%, rgba(220, 38, 38, 0.3) 50%, rgba(220, 38, 38, 0) 80%);
            border-radius: 50%;
            animation: pulse 2s infinite ease-in-out;
            pointer-events: none;
        }

        @keyframes pulse {
            0% { transform: scale(0.6); opacity: 0.9; }
            50% { transform: scale(1.3); opacity: 0.4; }
            100% { transform: scale(0.6); opacity: 0.9; }
        }
        
        .incident-center {
            background-color: #991b1b;
            border: 1px solid white; 
            border-radius: 50%;
            box-shadow: 0 0 2px rgba(0,0,0,0.5);
        }

        .info.legend, .info.filter-box {
            background: white; padding: 10px 14px;
            font-size: 14px; line-height: 24px;
            color: #333; box-shadow: 0 0 15px rgba(0,0,0,0.2);
            border-radius: 5px; border: 2px solid #b71c1c;
        }

        /* Styling for the new dropdowns */
        .filter-box select {
            width: 100%; padding: 5px; margin-top: 5px; margin-bottom: 10px;
            border-radius: 4px; border: 1px solid #ccc; font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        var map = L.map('map').setView([15.48, 120.59], 10);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        var incidentMarkers = L.featureGroup().addTo(map);
        var allIncidentData = []; // Store all data so we can filter it without reloading

        // PASTE YOUR CSV URL HERE
        var csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRDvZ_Avf8dU1XZUuo0HrrQbyEqpsukfyrb964X81Cwl9a2Vi5h07_m2ckWuReZrVVtlQB9eaH4_AZc/pub?gid=349846799&single=true&output=csv'; 

        // Icons defined once
        var auraIcon = L.divIcon({ html: '<div class="incident-aura"></div>', className: 'aura-container', iconSize: [30, 30], iconAnchor: [15, 15] });
        var centerIcon = L.divIcon({ html: '', className: 'incident-center', iconSize: [6, 6], iconAnchor: [3, 3] });

        Papa.parse(csvUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                allIncidentData = results.data;
                
                // 1. Extract unique Years and Months for the dropdowns
                var years = new Set();
                var months = new Set();
                
                allIncidentData.forEach(row => {
                    if(row['DATE']) {
                        let d = new Date(row['DATE']);
                        if(!isNaN(d)) {
                            years.add(d.getFullYear());
                            // Get the full month name (e.g., "January")
                            months.add(d.toLocaleString('default', { month: 'long' }));
                        }
                    }
                });

                // 2. Build the Filter UI in the top right
                var filterControl = L.control({position: 'topright'});
                filterControl.onAdd = function (map) {
                    var div = L.DomUtil.create('div', 'info filter-box');
                    div.innerHTML = '<strong style="color:#b71c1c;">Filter Incidents</strong><br>';
                    
                    // Year Dropdown
                    var yearHTML = '<label>Year:</label><select id="yearFilter"><option value="All">All Years</option>';
                    Array.from(years).sort().reverse().forEach(y => yearHTML += `<option value="${y}">${y}</option>`);
                    yearHTML += '</select>';
                    div.innerHTML += yearHTML;

                    // Month Dropdown
                    var monthHTML = '<label>Month:</label><select id="monthFilter"><option value="All">All Months</option>';
                    // Standard sort for months
                    const monthOrder = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
                    Array.from(months).sort((a,b) => monthOrder.indexOf(a) - monthOrder.indexOf(b)).forEach(m => monthHTML += `<option value="${m}">${m}</option>`);
                    monthHTML += '</select>';
                    div.innerHTML += monthHTML;

                    return div;
                };
                filterControl.addTo(map);

                // Add Event Listeners to the dropdowns
                document.getElementById('yearFilter').addEventListener('change', updateMap);
                document.getElementById('monthFilter').addEventListener('change', updateMap);

                // 3. Initial Map Draw
                updateMap();
            }
        });

        // 4. The function that filters and draws the dots
        function updateMap() {
            var selectedYear = document.getElementById('yearFilter').value;
            var selectedMonth = document.getElementById('monthFilter').value;

            // Clear existing markers
            incidentMarkers.clearLayers();

            allIncidentData.forEach(function(row) {
                var lat = parseFloat(row['LATITUDE']);
                var lng = parseFloat(row['LONGITUDE']); 
                
                if (!isNaN(lat) && !isNaN(lng) && row['DATE']) {
                    let d = new Date(row['DATE']);
                    if(!isNaN(d)) {
                        let rowYear = d.getFullYear().toString();
                        let rowMonth = d.toLocaleString('default', { month: 'long' });

                        // Check if the row matches the selected filters
                        var yearMatch = (selectedYear === 'All' || selectedYear === rowYear);
                        var monthMatch = (selectedMonth === 'All' || selectedMonth === rowMonth);

                        if (yearMatch && monthMatch) {
                            // Add Aura
                            L.marker([lat, lng], { icon: auraIcon, interactive: false }).addTo(incidentMarkers);
                            
                            // Add Center Dot & Popup
                            var marker = L.marker([lat, lng], { icon: centerIcon });
                            marker.bindPopup(`
                                <div style="line-height:1.6; min-width: 200px;">
                                    <strong style="font-size:1.2em; color:#b71c1c;">INCIDENT REPORT</strong><br>
                                    <hr style="margin: 5px 0;">
                                    <b>Date:</b> ${row['DATE']}<br>
                                    <b>Type:</b> ${row['TYPE'] || 'N/A'}<br>
                                    <b>Location:</b> ${row['BARANGAY'] || 'N/A'}<br>
                                </div>
                            `);
                            marker.addTo(incidentMarkers);
                        }
                    }
                }
            });

            // Re-zoom the map to fit the filtered incidents (if any exist)
            if (incidentMarkers.getLayers().length > 0) {
                map.fitBounds(incidentMarkers.getBounds(), { padding: [50, 50] });
            }
        }

        // Legend
        var legend = L.control({position: 'bottomright'});
        legend.onAdd = function (map) {
            var div = L.DomUtil.create('div', 'info legend');
            div.innerHTML += '<strong style="display:block; margin-bottom:5px; color:#b71c1c;">Spatial Incident</strong>';
            div.innerHTML += '<div style="display:inline-block; width:8px; height:8px; background:#991b1b; border-radius:50%; margin-right:6px; border: 1px solid #ffcccc;"></div> Incident Heat Map';
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
