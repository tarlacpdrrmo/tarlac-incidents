<!DOCTYPE html>
<html>
<head>
    <title>Tarlac PDRRMO | Impact Analytics Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Inter', sans-serif; cursor: crosshair; overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #f3f4f6; } 

        /* Control Panel */
        .control-panel {
            position: absolute;
            top: 15px; 
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(15, 23, 42, 0.75); 
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 16px; 
            border-radius: 40px; 
            color: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: row;
            gap: 12px; 
            align-items: center;
            white-space: nowrap;
        }

        .filter-group { display: flex; align-items: center; gap: 6px; }
        .filter-group label { font-size: 8px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; }
        .filter-group select, .filter-group input[type="text"] {
            padding: 4px 10px; 
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            border-radius: 15px; 
            font-family: 'Inter', sans-serif;
            font-size: 10px; 
            outline: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .filter-group input[type="text"] { width: 110px; cursor: text; }

        /* Theme Switch */
        .switch-container {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-left: 4px;
            padding-left: 12px;
            border-left: 1px solid rgba(255, 255, 255, 0.1); 
        }
        .switch { position: relative; display: inline-block; width: 32px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.15); transition: .3s ease; border-radius: 18px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 2px; bottom: 2px; background-color: #94a3b8; transition: .3s ease; border-radius: 50%; }
        input:checked + .slider { background-color: rgba(255, 255, 255, 0.3); border-color: rgba(255, 255, 255, 0.5); }
        input:checked + .slider:before { transform: translateX(14px); background-color: #ffffff; }

        /* FIX: Cleaned up Leaflet Zoom Controls */
        .leaflet-control-zoom { 
            border: none !important; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3) !important; 
            margin-top: 15px !important; 
            margin-left: 15px !important; 
            background: rgba(15, 23, 42, 0.8) !important;
            border-radius: 8px !important;
            overflow: hidden;
        }
        .leaflet-control-zoom a { 
            background: transparent !important; 
            color: white !important; 
            border: none !important; 
            width: 34px !important; 
            height: 34px !important; 
            line-height: 34px !important;
        }
        .leaflet-control-zoom-in { border-bottom: 1px solid rgba(255,255,255,0.1) !important; }

        /* FIX: Modern Expand Icon (Treemap) */
        .treemap-toggle-btn {
            position: absolute;
            top: 85px; 
            left: 15px;
            z-index: 1000;
            background: #ef4444;
            color: white;
            width: 34px;
            height: 34px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: all 0.2s ease;
        }
        .treemap-toggle-btn:hover { transform: scale(1.1); background: #dc2626; }

        /* FIX: 1980x1080 Pop-up Style Overlay */
        .treemap-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .treemap-overlay.active { display: flex; opacity: 1; }

        .treemap-modal {
            width: 90vw;
            height: 85vh;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .treemap-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .treemap-header h3 { margin: 0; color: white; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .close-treemap { background: none; border: none; color: #94a3b8; font-size: 24px; cursor: pointer; }

        /* Category Toggles */
        .category-panel { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .category-btn { background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); color: #94a3b8; padding: 4px 14px; border-radius: 20px; font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; transition: all 0.2s ease; }
        .category-btn.active { background: #ef4444; color: white; border-color: #ef4444; }

        /* Impact Panel */
        .impact-panel { position: absolute; top: 100px; right: 20px; z-index: 1000; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 16px; color: white; width: 220px; display: flex; flex-direction: column; gap: 12px; }
        .impact-panel h3 { margin: 0; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; font-weight: 700; }
        .impact-number { font-size: 22px; font-weight: 800; color: #ef4444; line-height: 1; }
        .impact-number.flood { color: #3b82f6; } .impact-number.vehicle { color: #f59e0b; }

        /* Tooltip */
        #hoverTooltip { position: absolute; background: rgba(15, 23, 42, 0.85); color: #f8fafc; padding: 8px 12px; border-radius: 8px; font-size: 11px; pointer-events: none; z-index: 2000; display: none; }
        
        /* Watermark */
        .watermark-container { position: absolute; bottom: 20px; left: 20px; z-index: 1000; display: flex; align-items: center; gap: 15px; opacity: 0.4; }
        .watermark-logo { width: 75px; }
        .watermark-text { color: #ffffff; font-size: 9px; font-weight: 700; text-transform: uppercase; }
        .light-mode-watermark .watermark-text { color: #1f2937; }

        /* Status */
        .live-status { position: absolute; bottom: 20px; right: 20px; background: rgba(15, 23, 42, 0.75); padding: 6px 12px; border-radius: 20px; color: #10b981; font-size: 9px; font-weight: 700; display: flex; align-items: center; gap: 8px; z-index: 1000; }
        .live-dot { width: 6px; height: 6px; background: #10b981; border-radius: 50%; animation: livePulse 2s infinite; }
        @keyframes livePulse { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
    </style>
</head>
<body>

    <div class="watermark-container light-mode-watermark" id="watermark">
        <img src="clean.jpg" alt="Tarlac Rescue Logo" class="watermark-logo">
        <div class="watermark-text">Tarlac Provincial Disaster Risk<br>Reduction Management Office</div>
    </div>

    <div id="hoverTooltip">Scanning...</div>

    <div class="live-status" id="liveStatusBox">
        <div class="live-dot"></div>
        <span id="liveStatusText">Live Sync Active</span>
    </div>

    <div class="impact-panel" id="impactPanel">
        <h3>Estimated Impact Analytics</h3>
        <div class="impact-stat">
            <span class="impact-title">Typhoon/Flood Families</span>
            <span class="impact-number flood" id="statFloodFamilies">0</span>
        </div>
        <div class="impact-stat">
            <span class="impact-title">Vehicles Involved</span>
            <span class="impact-number vehicle" id="statVehicles">0</span>
        </div>
    </div>

    <div class="treemap-toggle-btn" id="treemapToggleBtn" title="Expand Treemap">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 3 21 3 21 9"></polyline>
            <polyline points="9 21 3 21 3 15"></polyline>
            <line x1="21" y1="3" x2="14" y2="10"></line>
            <line x1="3" y1="21" x2="10" y2="14"></line>
        </svg>
    </div>

    <div class="treemap-overlay" id="treemapOverlay">
        <div class="treemap-modal">
            <div class="treemap-header">
                <h3>Incident Volume by Location</h3>
                <button class="close-treemap" id="closeTreemapBtn">&times;</button>
            </div>
            <div id="chartContainer" style="flex: 1; min-height: 0;"></div>
        </div>
    </div>

    <div id="map"></div>

    <div class="control-panel">
        <div class="filter-group">
            <label>Search</label>
            <input type="text" id="searchFilter" placeholder="Location...">
        </div>
        <div class="filter-group">
            <label>Year</label>
            <select id="yearFilter"><option value="All">All Years</option></select>
        </div>
        <div class="filter-group">
            <label>Month</label>
            <select id="monthFilter"><option value="All">All Months</option></select>
        </div>
        <div class="switch-container">
            <label style="font-size: 8px; color: #94a3b8; text-transform: uppercase; font-weight: 700;">Light Map</label>
            <label class="switch">
                <input type="checkbox" id="themeToggleCheckbox" checked>
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="category-panel" id="categoryPanel"></div>

    <script>
        var map = L.map('map', { zoomControl: false }).setView([15.4802, 120.5979], 11);
        L.control.zoom({ position: 'topleft' }).addTo(map);

        var darkBasemap = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; OpenStreetMap', maxZoom: 19 });
        var lightBasemap = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; OpenStreetMap', maxZoom: 19 });

        var currentBasemap = lightBasemap;
        currentBasemap.addTo(map);

        document.getElementById('themeToggleCheckbox').addEventListener('change', function(e) {
            map.removeLayer(currentBasemap);
            currentBasemap = e.target.checked ? lightBasemap : darkBasemap;
            currentBasemap.addTo(map).bringToBack();
            document.getElementById('watermark').className = e.target.checked ? 'watermark-container light-mode-watermark' : 'watermark-container';
        });

        // FIX: Treemap Overlay Logic
        var treemapOverlay = document.getElementById('treemapOverlay');
        document.getElementById('treemapToggleBtn').addEventListener('click', function() {
            treemapOverlay.style.display = 'flex';
            setTimeout(() => treemapOverlay.classList.add('active'), 10);
            if (apexTreemapChart) apexTreemapChart.windowResize();
        });

        document.getElementById('closeTreemapBtn').addEventListener('click', function() {
            treemapOverlay.classList.remove('active');
            setTimeout(() => treemapOverlay.style.display = 'none', 400);
        });

        var allData = [];
        var activeCoordinates = []; 
        var heatLayer = null; 
        var interactiveLayer = L.featureGroup().addTo(map); 
        var currentCategory = 'All'; 
        var apexTreemapChart = null; 

        var csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRDvZ_Avf8dU1XZUuo0HrrQbyEqpsukfyrb964X81Cwl9a2Vi5h07_m2ckWuReZrVVtlQB9eaH4_AZc/pub?gid=349846799&single=true&output=csv'; 

        fetchData(true); 
        setInterval(function() { fetchData(false); }, 60000);

        function fetchData(isInitialLoad) {
            Papa.parse(csvUrl, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    allData = results.data;
                    if (isInitialLoad) populateFilters(allData);
                    renderDashboard();
                }
            });
        }

        function populateFilters(data) {
            var years = new Set(), months = new Set(), types = new Set();
            data.forEach(row => {
                if(row['DATE']) {
                    let d = new Date(row['DATE']);
                    if(!isNaN(d)) {
                        years.add(d.getFullYear());
                        months.add(d.toLocaleString('default', { month: 'long' }));
                    }
                }
                if(row['TYPE']) types.add(row['TYPE'].trim());
            });

            var yearSelect = document.getElementById('yearFilter');
            yearSelect.innerHTML = '<option value="All">All Years</option>';
            Array.from(years).sort().reverse().forEach(y => yearSelect.add(new Option(y, y)));

            var monthSelect = document.getElementById('monthFilter');
            monthSelect.innerHTML = '<option value="All">All Months</option>';
            const monthOrder = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            Array.from(months).sort((a,b) => monthOrder.indexOf(a) - monthOrder.indexOf(b)).forEach(m => monthSelect.add(new Option(m, m)));

            var catPanel = document.getElementById('categoryPanel');
            var buttonsHtml = `<button class="category-btn ${currentCategory === 'All' ? 'active' : ''}" onclick="setCategory('All')">All</button>`;
            Array.from(types).sort().forEach(t => {
                if(t !== "") buttonsHtml += `<button class="category-btn ${currentCategory === t ? 'active' : ''}" onclick="setCategory('${t}')">${t}</button>`;
            });
            catPanel.innerHTML = buttonsHtml;
        }

        window.setCategory = function(cat) {
            currentCategory = cat;
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.toggle('active', btn.innerText === cat));
            renderDashboard();
        };

        document.getElementById('searchFilter').addEventListener('input', renderDashboard);
        document.getElementById('yearFilter').addEventListener('change', renderDashboard);
        document.getElementById('monthFilter').addEventListener('change', renderDashboard);

        // FIX: Treemap with readable fonts and smooth palette
        function updateTreemapChart(locationCounts) {
            var chartData = [];
            for (var loc in locationCounts) {
                if (loc.trim() !== '') chartData.push({ x: loc.replace("City of Tarlac (Capital), ", ""), y: locationCounts[loc] });
            }
            chartData.sort((a, b) => b.y - a.y);
            chartData = chartData.slice(0, 40);

            var options = {
                series: [{ data: chartData }],
                chart: { type: 'treemap', height: '100%', toolbar: { show: false }, background: 'transparent' },
                theme: { mode: 'dark' },
                dataLabels: {
                    enabled: true,
                    style: { fontSize: '16px', fontWeight: '800', fontFamily: 'Inter' },
                    formatter: (text, op) => [text, op.value]
                },
                plotOptions: {
                    treemap: {
                        enableShades: true,
                        colorScale: {
                            ranges: [
                                { from: 1, to: 3, color: '#0ea5e9' },
                                { from: 4, to: 10, color: '#f59e0b' },
                                { from: 11, to: 100, color: '#ef4444' }
                            ]
                        }
                    }
                }
            };

            if (!apexTreemapChart) {
                apexTreemapChart = new ApexCharts(document.querySelector("#chartContainer"), options);
                apexTreemapChart.render();
            } else {
                apexTreemapChart.updateSeries([{ data: chartData }]);
            }
        }

        function renderDashboard() {
            var selectedYear = document.getElementById('yearFilter').value;
            var selectedMonth = document.getElementById('monthFilter').value;
            var searchQuery = document.getElementById('searchFilter').value.toLowerCase();

            if (heatLayer) map.removeLayer(heatLayer);
            interactiveLayer.clearLayers();

            var heatPoints = [], locationCounts = {}, flood = 0, vehicle = 0;
            activeCoordinates = [];

            allData.forEach(row => {
                var lat = parseFloat(row['LATITUDE']), lng = parseFloat(row['LONGITUDE']);
                if (!isNaN(lat) && !isNaN(lng) && row['DATE']) {
                    let d = new Date(row['DATE']);
                    let rowYear = d.getFullYear().toString(), rowMonth = d.toLocaleString('default', { month: 'long' });
                    let locName = row['LOCATION'] || 'Unknown', type = row['TYPE'] ? row['TYPE'].trim() : 'Unspecified';

                    if ((selectedYear === 'All' || selectedYear === rowYear) &&
                        (selectedMonth === 'All' || selectedMonth === rowMonth) &&
                        locName.toLowerCase().includes(searchQuery) &&
                        (currentCategory === 'All' || type === currentCategory)) {
                        
                        heatPoints.push([lat, lng, 1]);
                        activeCoordinates.push(L.latLng(lat, lng));
                        locationCounts[locName] = (locationCounts[locName] || 0) + 1;
                        if (type.toLowerCase().includes('flood')) flood++;
                        if (type.toLowerCase().includes('vehicular')) vehicle++;

                        var marker = L.circleMarker([lat, lng], { radius: 10, color: 'transparent', fillOpacity: 0 });
                        marker.bindPopup(`<b>${locName}</b><br>${type}<br>${row['DATE']}`);
                        marker.addTo(interactiveLayer);
                    }
                }
            });

            document.getElementById('statFloodFamilies').innerText = (flood * 15).toLocaleString();
            document.getElementById('statVehicles').innerText = (vehicle * 2).toLocaleString();
            updateTreemapChart(locationCounts);
            heatLayer = L.heatLayer(heatPoints, { radius: 25, blur: 15, maxZoom: 14 }).addTo(map);
        }
    </script>
</body>
</html>
