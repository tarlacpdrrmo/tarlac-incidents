<!DOCTYPE html>
<html>
<head>
    <title>Tarlac Incident Heatmap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        #map { height: 100vh; width: 100vw; background: #111; } 

        /* Modern, minimal floating UI */
        .control-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(20, 20, 25, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 12px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            min-width: 200px;
        }

        .control-panel h2 {
            margin: 0 0 15px 0;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ef4444; /* Alert Red */
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        .filter-group {
            margin-bottom: 15px;
        }

        .filter-group label {
            display: block;
            font-size: 11px;
            color: #9ca3af;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .filter-group select {
            width: 100%;
            padding: 8px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            outline: none;
            cursor: pointer;
        }

        .filter-group select:focus {
            border-color: #ef4444;
        }

        /* Adjust default leaflet zoom controls for dark mode */
        .leaflet-control-zoom a {
            background-color: #1f2937 !important;
            color: #fff !important;
            border-color: #374151 !important;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="control-panel">
        <h2>Thermal Density</h2>
        
        <div class="filter-group">
            <label>Filter Year</label>
            <select id="yearFilter">
                <option value="All">All Time</option>
            </select>
        </div>

        <div class="filter-group">
            <label>Filter Month</label>
            <select id="monthFilter">
                <option value="All">All Months</option>
            </select>
        </div>
    </div>

    <script>
        // 1. Initialize Map (Centered on Tarlac)
        var map = L.map('map').setView([15.4802, 120.5979], 11);

        // 2. Dark Basemap (Perfect for Heatmaps)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);

        // Global variables
        var allData = [];
        var heatLayer = null; // Holds the true heatmap

        // Your published Google Sheet CSV
        var csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRDvZ_Avf8dU1XZUuo0HrrQbyEqpsukfyrb964X81Cwl9a2Vi5h07_m2ckWuReZrVVtlQB9eaH4_AZc/pub?gid=349846799&single=true&output=csv'; 

        // 3. Parse Data
        Papa.parse(csvUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                allData = results.data;
                populateFilters(allData);
                renderHeatmap();

                // Listen for dropdown changes
                document.getElementById('yearFilter').addEventListener('change', renderHeatmap);
                document.getElementById('monthFilter').addEventListener('change', renderHeatmap);
            }
        });

        // 4. Extract Years/Months for Dropdowns
        function populateFilters(data) {
            var years = new Set();
            var months = new Set();
            
            data.forEach(row => {
                if(row['DATE']) {
                    let d = new Date(row['DATE']);
                    if(!isNaN(d)) {
                        years.add(d.getFullYear());
                        months.add(d.toLocaleString('default', { month: 'long' }));
                    }
                }
            });

            var yearSelect = document.getElementById('yearFilter');
            Array.from(years).sort().reverse().forEach(y => {
                yearSelect.add(new Option(y, y));
            });

            var monthSelect = document.getElementById('monthFilter');
            const monthOrder = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            Array.from(months).sort((a,b) => monthOrder.indexOf(a) - monthOrder.indexOf(b)).forEach(m => {
                monthSelect.add(new Option(m, m));
            });
        }

        // 5. Draw the True Heatmap
        function renderHeatmap() {
            var selectedYear = document.getElementById('yearFilter').value;
            var selectedMonth = document.getElementById('monthFilter').value;

            // Remove old heatmap if it exists
            if (heatLayer) {
                map.removeLayer(heatLayer);
            }

            // Extract coordinates for the heat engine
            var heatPoints = [];

            allData.forEach(row => {
                var lat = parseFloat(row['LATITUDE']);
                var lng = parseFloat(row['LONGITUDE']);
                
                if (!isNaN(lat) && !isNaN(lng) && row['DATE']) {
                    let d = new Date(row['DATE']);
                    if(!isNaN(d)) {
                        let rowYear = d.getFullYear().toString();
                        let rowMonth = d.toLocaleString('default', { month: 'long' });

                        var matchYear = (selectedYear === 'All' || selectedYear === rowYear);
                        var matchMonth = (selectedMonth === 'All' || selectedMonth === rowMonth);

                        if (matchYear && matchMonth) {
                            // Format required by leaflet.heat: [lat, lng, intensity]
                            // We use an intensity of 1 per record. The plugin handles blending.
                            heatPoints.push([lat, lng, 1]); 
                        }
                    }
                }
            });

            // Configure the Heatmap Physics
            heatLayer = L.heatLayer(heatPoints, {
                radius: 25,     // Size of each point's influence
                blur: 15,       // How much the points blend together
                maxZoom: 14,    // Zoom level where points reach maximum intensity
                max: 1.0,       // Maximum point intensity
                gradient: {     // Custom color scale
                    0.2: '#00f', // Blue (Low)
                    0.4: '#0ff', // Cyan
                    0.6: '#0f0', // Green
                    0.8: '#ff0', // Yellow
                    1.0: '#f00'  // Red (High)
                }
            }).addTo(map);
        }
    </script>
</body>
</html>
