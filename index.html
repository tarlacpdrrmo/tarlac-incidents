<!DOCTYPE html>
<html>
<head>
    <title>Tarlac Incident Time-Lapse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Inter', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #111; } 

        /* --- UI Shared Styles --- */
        .glass-panel {
            position: absolute;
            z-index: 1000;
            background: rgba(15, 23, 42, 0.75); 
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
        }

        /* --- Top Pill (Search Only) --- */
        .top-pill {
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            border-radius: 50px; 
        }

        .filter-group { display: flex; align-items: center; gap: 8px; }
        .filter-group label { font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
        .filter-group input[type="text"] {
            padding: 6px 14px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            border-radius: 20px; 
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            outline: none;
            width: 200px;
            transition: all 0.2s ease;
        }
        .filter-group input[type="text"]:focus { border-color: #ef4444; background: rgba(0, 0, 0, 0.6); }

        /* --- NEW: Bottom Timeline Pill --- */
        .bottom-pill {
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 50px;
            gap: 15px;
            width: 400px;
            justify-content: space-between;
        }

        .play-btn {
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.2s ease;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.4);
        }
        .play-btn:hover { background: #dc2626; transform: scale(1.05); }

        /* Custom Slider Styling */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 14px;
            width: 14px;
            border-radius: 50%;
            background: #ef4444;
            cursor: pointer;
            margin-top: -5px;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
        }

        .time-label {
            font-size: 12px;
            font-weight: 700;
            color: #f8fafc;
            min-width: 80px;
            text-align: right;
            letter-spacing: 0.5px;
        }

        /* Leaflet Controls */
        .leaflet-control-zoom { border: none !important; box-shadow: 0 4px 10px rgba(0,0,0,0.5) !important; opacity: 0.7; margin-top: 20px !important; margin-left: 20px !important; }
        .leaflet-control-zoom a { width: 20px !important; height: 20px !important; line-height: 20px !important; font-size: 14px !important; background-color: #1e293b !important; color: #cbd5e1 !important; border-color: #334155 !important; }
        .leaflet-control-zoom a:hover { background-color: #334155 !important; }

        .leaflet-popup-content-wrapper { border-radius: 8px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3); font-family: 'Inter', sans-serif; }
        .leaflet-popup-content { margin: 14px; color: #1f2937; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="glass-panel top-pill">
        <div class="filter-group">
            <label>Search Location</label>
            <input type="text" id="searchFilter" placeholder="e.g. San Roque...">
        </div>
    </div>

    <div class="glass-panel bottom-pill">
        <button id="playBtn" class="play-btn">▶</button>
        <input type="range" id="timeSlider" min="0" max="0" value="0">
        <div id="timeLabel" class="time-label">Loading...</div>
    </div>

    <script>
        var map = L.map('map', { zoomControl: false }).setView([15.4802, 120.5979], 11);
        L.control.zoom({ position: 'topleft' }).addTo(map);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);

        var allData = [];
        var heatLayer = null; 
        var interactiveLayer = L.featureGroup().addTo(map); 
        
        // Timeline State Variables
        var timePeriods = []; // Array of "YYYY-MM"
        var isPlaying = false;
        var playInterval;
        const PLAY_SPEED_MS = 800; // Speed of animation (800ms per month)

        var csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRDvZ_Avf8dU1XZUuo0HrrQbyEqpsukfyrb964X81Cwl9a2Vi5h07_m2ckWuReZrVVtlQB9eaH4_AZc/pub?gid=349846799&single=true&output=csv'; 

        Papa.parse(csvUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                allData = results.data;
                initializeTimeline(allData);
                renderDashboard();

                document.getElementById('searchFilter').addEventListener('input', renderDashboard);
                document.getElementById('timeSlider').addEventListener('input', () => {
                    pauseAnimation();
                    renderDashboard();
                });
                document.getElementById('playBtn').addEventListener('click', togglePlay);
            }
        });

        // Setup the Timeline based on CSV data
        function initializeTimeline(data) {
            var periods = new Set();
            
            data.forEach(row => {
                if(row['DATE']) {
                    let d = new Date(row['DATE']);
                    if(!isNaN(d)) {
                        // Create a YYYY-MM string for easy sorting
                        let month = (d.getMonth() + 1).toString().padStart(2, '0');
                        let yearMonth = `${d.getFullYear()}-${month}`;
                        periods.add(yearMonth);
                    }
                }
            });

            // Sort chronologically
            timePeriods = Array.from(periods).sort();
            
            // Configure Slider
            var slider = document.getElementById('timeSlider');
            slider.max = timePeriods.length > 0 ? timePeriods.length - 1 : 0;
            slider.value = 0;
        }

        // Helper to format "2026-04" into "Apr 2026"
        function formatTimeLabel(yyyyMm) {
            if (!yyyyMm) return "";
            var parts = yyyyMm.split('-');
            var d = new Date(parts[0], parts[1] - 1);
            return d.toLocaleString('default', { month: 'short' }) + " " + parts[0];
        }

        // Playback Controls
        function togglePlay() {
            if (isPlaying) {
                pauseAnimation();
            } else {
                startAnimation();
            }
        }

        function startAnimation() {
            var slider = document.getElementById('timeSlider');
            if (parseInt(slider.value) >= timePeriods.length - 1) {
                slider.value = 0; // Restart if at the end
            }
            
            isPlaying = true;
            document.getElementById('playBtn').innerHTML = "⏸";
            
            playInterval = setInterval(() => {
                var currentVal = parseInt(slider.value);
                if (currentVal < timePeriods.length - 1) {
                    slider.value = currentVal + 1;
                    renderDashboard();
                } else {
                    pauseAnimation(); // Stop at the end
                }
            }, PLAY_SPEED_MS);
        }

        function pauseAnimation() {
            isPlaying = false;
            document.getElementById('playBtn').innerHTML = "▶";
            clearInterval(playInterval);
        }

        function renderDashboard() {
            if (timePeriods.length === 0) return;

            var sliderValue = document.getElementById('timeSlider').value;
            var currentPeriod = timePeriods[sliderValue];
            var searchQuery = document.getElementById('searchFilter').value.toLowerCase();

            // Update UI Label
            document.getElementById('timeLabel').innerText = formatTimeLabel(currentPeriod);

            // Clear old layers
            if (heatLayer) map.removeLayer(heatLayer);
            interactiveLayer.clearLayers();

            var heatPoints = [];
            var groupedData = {};

            // Aggregate Data specifically for the selected month/year
            allData.forEach(row => {
                var lat = parseFloat(row['LATITUDE']);
                var lng = parseFloat(row['LONGITUDE']);
                
                if (!isNaN(lat) && !isNaN(lng) && row['DATE']) {
                    let d = new Date(row['DATE']);
                    if(!isNaN(d)) {
                        let month = (d.getMonth() + 1).toString().padStart(2, '0');
                        let rowPeriod = `${d.getFullYear()}-${month}`;
                        let locName = row['LOCATION'] || 'Unknown Location';

                        var matchPeriod = (currentPeriod === rowPeriod);
                        var matchSearch = locName.toLowerCase().includes(searchQuery);

                        if (matchPeriod && matchSearch) {
                            heatPoints.push([lat, lng, 1]); 

                            var locationKey = lat + "_" + lng;
                            var incidentType = row['TYPE'] || 'Unspecified';

                            if (!groupedData[locationKey]) {
                                groupedData[locationKey] = {
                                    lat: lat,
                                    lng: lng,
                                    locationName: locName,
                                    totalIncidents: 0,
                                    types: {},
                                    lastDate: row['DATE']
                                };
                            }

                            groupedData[locationKey].totalIncidents += 1;
                            groupedData[locationKey].lastDate = row['DATE'];
                            groupedData[locationKey].types[incidentType] = (groupedData[locationKey].types[incidentType] || 0) + 1;
                        }
                    }
                }
            });

            // Render Heatmap
            heatLayer = L.heatLayer(heatPoints, {
                radius: 25,     
                blur: 15,       
                maxZoom: 14,    
                max: 1.0,       
                gradient: { 0.2: '#00f', 0.4: '#0ff', 0.6: '#0f0', 0.8: '#ff0', 1.0: '#f00' }
            }).addTo(map);

            // Render Tiny Interactive Dots
            Object.values(groupedData).forEach(function(loc) {
                var typesHtml = '';
                for (var t in loc.types) {
                    typesHtml += `
                        <div style="display: flex; justify-content: space-between; border-bottom: 1px solid #f3f4f6; padding-bottom: 4px; margin-bottom: 4px;">
                            <span style="color: #6b7280; font-weight: 600;">${t}:</span>
                            <span style="color: #b91c1c; font-weight: 700;">${loc.types[t]}</span>
                        </div>`;
                }

                var tinyMarker = L.circleMarker([loc.lat, loc.lng], {
                    radius: 3, 
                    fillColor: "#ffffff",
                    color: "#ffffff", 
                    weight: 1,
                    opacity: 0.4,
                    fillOpacity: 0.2
                });
                
                tinyMarker.bindPopup(`
                    <div style="line-height:1.8; min-width: 180px; font-size: 12px;">
                        <strong style="font-size: 10px; margin-bottom: 6px; border-bottom: 2px solid #fee2e2; padding-bottom: 4px; display: block;">Location Summary</strong>
                        
                        <div style="display: flex; justify-content: space-between; border-bottom: 2px solid #fee2e2; padding-bottom: 4px; margin-bottom: 6px;">
                            <span style="color: #111827; font-weight: 700;">${loc.locationName}</span>
                            <span style="color: #b91c1c; font-weight: 700; background: #fee2e2; padding: 0 6px; border-radius: 4px;">Total: ${loc.totalIncidents}</span>
                        </div>
                        
                        <div style="font-size: 9px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;">Incident Breakdown</div>
                        ${typesHtml}
                        
                        <div style="font-size: 10px; color: #9ca3af; text-align: right; margin-top: 6px;">
                            Last Logged: ${loc.lastDate}
                        </div>
                    </div>
                `);

                tinyMarker.addTo(interactiveLayer);
            });
        }
    </script>
</body>
</html>
