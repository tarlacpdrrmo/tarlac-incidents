<!DOCTYPE html>
<html>
<head>
    <title>Tarlac PDRRMO | Impact Analytics Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Inter', sans-serif; cursor: crosshair; overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #f3f4f6; } 

        /* Control Panel */
        .control-panel {
            position: absolute;
            top: 15px; left: 50%; transform: translateX(-50%); z-index: 1000;
            background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 16px; border-radius: 40px; color: white; box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            display: flex; flex-direction: row; gap: 12px; align-items: center; white-space: nowrap;
        }

        .filter-group { display: flex; align-items: center; gap: 6px; }
        .filter-group label { font-size: 8px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; }
        .filter-group select, .filter-group input[type="text"] {
            padding: 4px 10px; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.15);
            color: white; border-radius: 15px; font-family: 'Inter', sans-serif; font-size: 10px; outline: none; transition: all 0.2s ease;
        }
        .filter-group input[type="text"] { width: 110px; cursor: text; }

        /* Theme Switch */
        .switch-container { display: flex; align-items: center; gap: 6px; margin-left: 4px; padding-left: 12px; border-left: 1px solid rgba(255, 255, 255, 0.1); }
        .switch { position: relative; display: inline-block; width: 32px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.15); transition: .3s ease; border-radius: 18px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 2px; bottom: 2px; background-color: #94a3b8; transition: .3s ease; border-radius: 50%; }
        input:checked + .slider { background-color: rgba(255, 255, 255, 0.3); border-color: rgba(255, 255, 255, 0.5); }
        input:checked + .slider:before { transform: translateX(14px); background-color: #ffffff; }

        /* Modernized Overlay (Card Style like image 2) */
        .treemap-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(15, 23, 42, 0.5); /* Dim backdrop */
            backdrop-filter: blur(8px);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .treemap-overlay.active { display: flex; opacity: 1; }

        .treemap-modal {
            background: #ffffff;
            width: 90vw;
            height: 80vh;
            max-width: 1400px;
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: scale(0.9);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .treemap-overlay.active .treemap-modal { transform: scale(1); }

        .treemap-header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 20px; border-bottom: 1px solid #f1f5f9; padding-bottom: 16px; 
        }
        .treemap-header h3 { margin: 0; color: #1e293b; font-size: 16px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
        .close-treemap { background: #f1f5f9; border: none; color: #64748b; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .close-treemap:hover { background: #ef4444; color: white; }

        /* Modernized UI Elements */
        .leaflet-control-zoom { border: none !important; box-shadow: 0 4px 15px rgba(0,0,0,0.2) !important; background: white !important; border-radius: 8px !important; overflow: hidden; margin-top: 15px !important; margin-left: 15px !important; }
        .leaflet-control-zoom a { width: 34px !important; height: 34px !important; line-height: 34px !important; color: #1e293b !important; background: white !important; border: none !important; transition: 0.2s; }
        .leaflet-control-zoom-in { border-bottom: 1px solid #f1f5f9 !important; }

        .treemap-toggle-btn {
            position: absolute; top: 85px; left: 15px; z-index: 1000;
            background: #ffffff; color: #1e293b; width: 38px; height: 38px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; transition: all 0.2s ease;
        }
        .treemap-toggle-btn:hover { background: #ef4444; color: white; border-color: #ef4444; transform: translateY(-2px); }

        /* Impact Panel */
        .impact-panel { position: absolute; top: 100px; right: 20px; z-index: 1000; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid #e2e8f0; border-radius: 12px; padding: 16px; color: #1e293b; width: 220px; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .impact-panel h3 { margin: 0; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #64748b; border-bottom: 1px solid #f1f5f9; padding-bottom: 8px; font-weight: 700; }
        .impact-number { font-size: 24px; font-weight: 800; color: #ef4444; line-height: 1; }
        .impact-number.flood { color: #2563eb; } .impact-number.vehicle { color: #d97706; }

        /* Status & Tooltip */
        #hoverTooltip { position: absolute; background: rgba(15, 23, 42, 0.85); color: white; padding: 8px 12px; border-radius: 8px; font-size: 11px; pointer-events: none; z-index: 2000; display: none; }
        .live-status { position: absolute; bottom: 20px; right: 20px; background: white; padding: 6px 12px; border-radius: 20px; color: #10b981; font-size: 9px; font-weight: 800; display: flex; align-items: center; gap: 8px; z-index: 1000; border: 1px solid #e2e8f0; }
        .live-dot { width: 6px; height: 6px; background: #10b981; border-radius: 50%; animation: livePulse 2s infinite; }
        @keyframes livePulse { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }

        /* Watermark */
        .watermark-container { position: absolute; bottom: 20px; left: 20px; z-index: 1000; display: flex; align-items: center; gap: 15px; opacity: 0.5; }
        .watermark-logo { width: 75px; }
        .watermark-text { color: #1e293b; font-size: 9px; font-weight: 800; text-transform: uppercase; }
        
        /* Category Panel */
        .category-panel { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .category-btn { background: white; border: 1px solid #e2e8f0; color: #64748b; padding: 6px 16px; border-radius: 20px; font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .category-btn.active { background: #ef4444; color: white; border-color: #ef4444; box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3); }
    </style>
</head>
<body>

    <div class="watermark-container" id="watermark">
        <img src="clean.jpg" alt="Rescue Logo" class="watermark-logo">
        <div class="watermark-text">Tarlac Provincial Disaster Risk<br>Reduction Management Office</div>
    </div>

    <div id="hoverTooltip">Scanning...</div>

    <div class="live-status" id="liveStatusBox">
        <div class="live-dot"></div>
        <span id="liveStatusText">Live Sync Active</span>
    </div>

    <div class="impact-panel" id="impactPanel">
        <h3>Incident Analytics</h3>
        <div class="impact-stat">
            <span class="impact-title">Typhoon/Flood (Est. Families)</span>
            <span class="impact-number flood" id="statFloodFamilies">0</span>
        </div>
        <div class="impact-stat">
            <span class="impact-title">Vehicular Accidents</span>
            <span class="impact-number vehicle" id="statVehicles">0</span>
        </div>
    </div>

    <div class="treemap-toggle-btn" id="treemapToggleBtn" title="Location Treemap">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="3" y1="14" x2="21" y2="14"></line>
            <line x1="14" y1="3" x2="14" y2="14"></line>
        </svg>
    </div>

    <div class="treemap-overlay" id="treemapOverlay">
        <div class="treemap-modal">
            <div class="treemap-header">
                <h3>Incident Volume per Barangay</h3>
                <button class="close-treemap" id="closeTreemapBtn">&times;</button>
            </div>
            <div id="chartContainer" style="flex: 1; min-height: 0;"></div>
        </div>
    </div>

    <div id="map"></div>

    <div class="control-panel">
        <div class="filter-group"><label>Search</label><input type="text" id="searchFilter" placeholder="Barangay..."></div>
        <div class="filter-group"><label>Year</label><select id="yearFilter"><option value="All">All Years</option></select></div>
        <div class="filter-group"><label>Month</label><select id="monthFilter"><option value="All">All Months</option></select></div>
        <div class="switch-container">
            <label style="font-size: 8px; color: #94a3b8; text-transform: uppercase; font-weight: 700;">Light Map</label>
            <label class="switch"><input type="checkbox" id="themeToggleCheckbox" checked><span class="slider"></span></label>
        </div>
    </div>

    <div class="category-panel" id="categoryPanel"></div>

    <script>
        var map = L.map('map', { zoomControl: false }).setView([15.4802, 120.5979], 11);
        L.control.zoom({ position: 'topleft' }).addTo(map);

        var darkBasemap = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; OSM', maxZoom: 19 });
        var lightBasemap = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; OSM', maxZoom: 19 });

        var currentBasemap = lightBasemap; currentBasemap.addTo(map);

        document.getElementById('themeToggleCheckbox').addEventListener('change', function(e) {
            map.removeLayer(currentBasemap);
            currentBasemap = e.target.checked ? lightBasemap : darkBasemap;
            currentBasemap.addTo(map).bringToBack();
        });

        var treemapOverlay = document.getElementById('treemapOverlay');
        document.getElementById('treemapToggleBtn').addEventListener('click', function() {
            treemapOverlay.style.display = 'flex';
            setTimeout(() => treemapOverlay.classList.add('active'), 10);
            if(apexTreemapChart) apexTreemapChart.windowResize();
        });
        document.getElementById('closeTreemapBtn').addEventListener('click', function() {
            treemapOverlay.classList.remove('active');
            setTimeout(() => treemapOverlay.style.display = 'none', 400);
        });

        var allData = []; var activeCoordinates = []; var heatLayer = null; var interactiveLayer = L.featureGroup().addTo(map);
        var hoverTooltip = document.getElementById('hoverTooltip'); var currentCategory = 'All'; var apexTreemapChart = null;

        var csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRDvZ_Avf8dU1XZUuo0HrrQbyEqpsukfyrb964X81Cwl9a2Vi5h07_m2ckWuReZrVVtlQB9eaH4_AZc/pub?gid=349846799&single=true&output=csv';

        fetchData(true); setInterval(function() { fetchData(false); }, 60000);

        function fetchData(isInitialLoad) {
            Papa.parse(csvUrl, { download: true, header: true, skipEmptyLines: true, complete: function(results) {
                allData = results.data; if (isInitialLoad) populateFilters(allData); renderDashboard();
            }});
        }

        function populateFilters(data) {
            var years = new Set(), months = new Set(), types = new Set();
            data.forEach(row => {
                if(row['DATE']) { let d = new Date(row['DATE']); if(!isNaN(d)) { years.add(d.getFullYear()); months.add(d.toLocaleString('default', { month: 'long' })); } }
                if(row['TYPE']) types.add(row['TYPE'].trim());
            });
            var yS = document.getElementById('yearFilter'); yS.innerHTML = '<option value="All">All Years</option>';
            Array.from(years).sort().reverse().forEach(y => yS.add(new Option(y, y)));
            var mS = document.getElementById('monthFilter'); mS.innerHTML = '<option value="All">All Months</option>';
            const monthOrder = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            Array.from(months).sort((a,b) => monthOrder.indexOf(a) - monthOrder.indexOf(b)).forEach(m => mS.add(new Option(m, m)));
            var buttonsHtml = `<button class="category-btn ${currentCategory === 'All' ? 'active' : ''}" onclick="setCategory('All')">All</button>`;
            Array.from(types).sort().forEach(t => { if(t !== "") buttonsHtml += `<button class="category-btn ${currentCategory === t ? 'active' : ''}" onclick="setCategory('${t}')">${t}</button>`; });
            document.getElementById('categoryPanel').innerHTML = buttonsHtml;
        }

        window.setCategory = function(cat) {
            currentCategory = cat; document.querySelectorAll('.category-btn').forEach(btn => btn.classList.toggle('active', btn.innerText === cat)); renderDashboard();
        };

        document.getElementById('searchFilter').addEventListener('input', renderDashboard);
        document.getElementById('yearFilter').addEventListener('change', renderDashboard);
        document.getElementById('monthFilter').addEventListener('change', renderDashboard);

        function updateTreemapChart(locationCounts) {
            var chartData = []; for (var loc in locationCounts) { if (loc.trim() !== '') chartData.push({ x: loc.replace("City of Tarlac (Capital), ", ""), y: locationCounts[loc] }); }
            chartData.sort((a, b) => b.y - a.y); chartData = chartData.slice(0, 40);
            var options = {
                series: [{ data: chartData }], chart: { type: 'treemap', height: '100%', toolbar: { show: false } },
                theme: { mode: 'light' },
                dataLabels: { enabled: true, style: { fontSize: '14px', fontWeight: '800', fontFamily: 'Inter' }, formatter: (text, op) => [text, op.value] },
                plotOptions: { treemap: { enableShades: true, colorScale: { ranges: [{ from: 1, to: 3, color: '#60a5fa' }, { from: 4, to: 10, color: '#fbbf24' }, { from: 11, to: 1000, color: '#f87171' }] } } }
            };
            if (!apexTreemapChart) { apexTreemapChart = new ApexCharts(document.querySelector("#chartContainer"), options); apexTreemapChart.render(); }
            else { apexTreemapChart.updateSeries([{ data: chartData }]); }
        }

        function renderDashboard() {
            var sY = document.getElementById('yearFilter').value; var sM = document.getElementById('monthFilter').value; var sQ = document.getElementById('searchFilter').value.toLowerCase();
            if (heatLayer) map.removeLayer(heatLayer); interactiveLayer.clearLayers();
            var heatPoints = [], locationCounts = {}, groupedData = {}, flood = 0, vehicle = 0; activeCoordinates = [];
            allData.forEach(row => {
                var lat = parseFloat(row['LATITUDE']), lng = parseFloat(row['LONGITUDE']);
                if (!isNaN(lat) && !isNaN(lng) && row['DATE']) {
                    let d = new Date(row['DATE']); let rY = d.getFullYear().toString(), rM = d.toLocaleString('default', { month: 'long' });
                    let loc = row['LOCATION'] || 'Unknown', type = row['TYPE'] ? row['TYPE'].trim() : 'Unspecified';
                    if ((sY === 'All' || sY === rY) && (sM === 'All' || sM === rM) && loc.toLowerCase().includes(sQ) && (currentCategory === 'All' || type === currentCategory)) {
                        heatPoints.push([lat, lng, 1]); activeCoordinates.push(L.latLng(lat, lng));
                        locationCounts[loc] = (locationCounts[loc] || 0) + 1;
                        if(type.toLowerCase().includes('flood')) flood++; if(type.toLowerCase().includes('accident')) vehicle++;
                        var key = lat + "_" + lng; if (!groupedData[key]) { groupedData[key] = { lat, lng, name: loc, total: 0, types: {}, date: row['DATE'] }; }
                        groupedData[key].total++; groupedData[key].types[type] = (groupedData[key].types[type] || 0) + 1;
                    }
                }
            });
            document.getElementById('statFloodFamilies').innerText = (flood * 15).toLocaleString();
            document.getElementById('statVehicles').innerText = (vehicle * 2).toLocaleString();
            updateTreemapChart(locationCounts); heatLayer = L.heatLayer(heatPoints, { radius: 25, blur: 15, maxZoom: 14 }).addTo(map);
            Object.values(groupedData).forEach(loc => {
                var typesHtml = Object.entries(loc.types).map(([t, count]) => `<div style="display:flex;justify-content:space-between;border-bottom:1px solid #eee;margin-bottom:4px;"><span style="color:#666;">${t}:</span><b>${count}</b></div>`).join('');
                L.circleMarker([loc.lat, loc.lng], { radius: 12, color: 'transparent', fillOpacity: 0 })
                    .bindPopup(`<div style="min-width:180px; font-family:Inter;"><b>${loc.name}</b><br><span style="color:red">Total: ${loc.total}</span><br>${typesHtml}<br><small>${loc.date}</small></div>`)
                    .addTo(interactiveLayer);
            });
        }

        map.on('mousemove', function(e) {
            hoverTooltip.style.display = 'block'; hoverTooltip.style.left = e.originalEvent.clientX + 'px'; hoverTooltip.style.top = e.originalEvent.clientY + 'px';
            var incidentCount = 0; activeCoordinates.forEach(coord => { if (e.latlng.distanceTo(coord) <= 1000) incidentCount++; });
            hoverTooltip.innerHTML = incidentCount > 0 ? `<b>${incidentCount}</b> incidents within 1km` : `<span style="color:#94a3b8;">No incidents within 1km</span>`;
        });
        map.on('mouseout', function() { hoverTooltip.style.display = 'none'; });
    </script>
</body>
</html>
